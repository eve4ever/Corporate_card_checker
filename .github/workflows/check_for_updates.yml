name: Check Corporate Card

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check stock and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="https://www.mycorporate.co.il/?page=Benefit&uuid=89ff39db-8348-456a-9667-e2dae46e&category_id=81"
          
          RESPONSE=$(curl -s "$URL")
          
          if echo "$RESPONSE" | grep -q "אזל המלאי למחיר מועדון"; then
            STATUS="❌ אזל המלאי למחיר מועדון"
          else
            STATUS="✅ מחיר מועדון זמין!"
          fi
          
            MESSAGE="*כרטיס Corporate עם הטבת 30%*
            ← ${STATUS}
            
            ${URL}"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${MESSAGE}\", \"parse_mode\": \"Markdown\", \"disable_web_page_preview\": true}"
