name: Search Reminder

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send search reminder
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"<b>🔍 תזכורת חיפוש מסגרת דיגיטלית</b>\n\n<a href=\\\"tg://search?query=oral-b io\\\">חפשי: מסגרת דיגיטלית</a>\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"
