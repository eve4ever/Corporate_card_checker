name: Actions Menu

on:
  schedule:
    - cron: '0 11,14,18,20 * * *'  # 11am, 2pm, 6pm, 8pm
  workflow_dispatch:

permissions:
  contents: write

jobs:
  handle_commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check for commands
        id: check_cmd
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates")
          
          echo "=== DEBUG: Full Response ==="
          echo "$UPDATES"
          echo "=== END DEBUG ==="
          
          # Extract latest message text and decode Unicode
          MESSAGE=$(echo "$UPDATES" | jq -r '.result[-1].message.text // empty')
          UPDATE_ID=$(echo "$UPDATES" | jq -r '.result[-1].update_id // empty')
          
          echo "DEBUG: MESSAGE=$MESSAGE"
          echo "DEBUG: UPDATE_ID=$UPDATE_ID"
          echo "MESSAGE=$MESSAGE" >> $GITHUB_OUTPUT
          echo "UPDATE_ID=$UPDATE_ID" >> $GITHUB_OUTPUT
          
          if [ -n "$UPDATE_ID" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=$((UPDATE_ID + 1))" > /dev/null
          fi
      

      - name: Handle חיפוש חדש command
        if: contains(steps.check_cmd.outputs.MESSAGE, 'חיפוש חדש')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Extract keyword and time from message
          MESSAGE="${{ steps.check_cmd.outputs.MESSAGE }}"
          KEYWORD=$(echo "$MESSAGE" | sed 's/חיפוש חדש //; s/ [0-9]*:[0-9]*//')
          TIME=$(echo "$MESSAGE" | grep -oP '[0-9]{1,2}:[0-9]{2}$')
          
          # Validate time format
          if ! echo "$TIME" | grep -qE '^(11|14|18|20):[0-9]{2}$'; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "❌ שעה לא תקינה. השתמשי: חיפוש חדש starbucks 18:00\n\nשעות זמינות: 11:00, 14:00, 18:00, 20:00"}'
            exit 0
          fi
          
          if [ -z "$KEYWORD" ] || [ -z "$TIME" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "❌ פורמט לא תקין.\n\nדוגמה: חיפוש חדש starbucks 18:00"}'
            exit 0
          fi
          
          # Initialize searches.json if doesn't exist
          if [ ! -f "searches.json" ]; then
            echo '{"searches": []}' > searches.json
          fi
          
          # Add new search
          jq '.searches += [{"keyword": "'$KEYWORD'", "time": "'$TIME'"}]' searches.json > searches.json.tmp
          mv searches.json.tmp searches.json
          
          # Commit to GitHub
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add searches.json
          git commit -m "Add search: $KEYWORD at $TIME" || true
          git push
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "✅ נוסף: <b>'$KEYWORD'</b> ב<b>'$TIME'</b>", "parse_mode": "HTML"}'
      
      - name: Handle הצג command
        if: contains(steps.check_cmd.outputs.MESSAGE, 'הצג')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ ! -f "searches.json" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "📭 אין חיפושים שמורים"}'
            exit 0
          fi
          
          SEARCHES=$(cat searches.json | jq -r '.searches | if length == 0 then "📭 אין חיפושים שמורים" else "📋 <b>החיפושים שלך:</b>\n" + (to_entries | map("\(.key + 1)️⃣ <b>\(.value.keyword)</b> - \(.value.time)") | join("\n")) end')
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": '"$(echo "$SEARCHES" | jq -Rs .)"', "parse_mode": "HTML"}'
      
      - name: Handle בטל command
        if: contains(steps.check_cmd.outputs.MESSAGE, 'בטל')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ ! -f "searches.json" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "📭 אין חיפושים שמורים"}'
            exit 0
          fi
          
          MESSAGE="${{ steps.check_cmd.outputs.MESSAGE }}"
          KEYWORD=$(echo "$MESSAGE" | sed 's/בטל //')
          
          if [ -z "$KEYWORD" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "❌ פורמט לא תקין.\n\nדוגמה: בטל starbucks"}'
            exit 0
          fi
          
          # Remove search by keyword
          jq '.searches |= map(select(.keyword != "'$KEYWORD'"))' searches.json > searches.json.tmp
          mv searches.json.tmp searches.json
          
          # Commit to GitHub
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add searches.json
          git commit -m "Delete search: $KEYWORD" || true
          git push
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "'${TELEGRAM_CHAT_ID}'", "text": "✅ נמחק: <b>'$KEYWORD'</b>", "parse_mode": "HTML"}'
  
  send_reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get current hour
        id: time
        run: |
          HOUR=$(date +%H)
          echo "HOUR=$HOUR" >> $GITHUB_OUTPUT
      
      - name: Send search reminders
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ ! -f "searches.json" ]; then
            exit 0
          fi
          
          HOUR=${{ steps.time.outputs.HOUR }}
          
          # Map hour to time format (11=11:00, 14=14:00, 18=18:00, 20=20:00)
          case $HOUR in
            11) TIME="11:00" ;;
            14) TIME="14:00" ;;
            18) TIME="18:00" ;;
            20) TIME="20:00" ;;
            *) exit 0 ;;
          esac
          
          # Get all searches for current time
          KEYWORDS=$(cat searches.json | jq -r '.searches[] | select(.time == "'$TIME'") | .keyword')
          
          if [ -z "$KEYWORDS" ]; then
            exit 0
          fi
          
          # Send reminder for each keyword
          while IFS= read -r KEYWORD; do
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d '{
                "chat_id": "'${TELEGRAM_CHAT_ID}'",
                "text": "<b>🔔 תזכורת חיפוש</b>\n\n<a href=\"tg://search?query='"${KEYWORD}"'\">חפשי: '"${KEYWORD}"'</a>",
                "parse_mode": "HTML",
                "disable_web_page_preview": true
              }'
            sleep 1
          done <<< "$KEYWORDS"
