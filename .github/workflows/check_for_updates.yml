name: Check Corporate Card

on:
  schedule:
    - cron: '0 7,16 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if paused this month
        id: check_pause
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # קבל הודעות אחרונות מהבוט
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates")
          
          # DEBUG - הצג את כל ההודעות
          echo "=== DEBUG: הודעות שהתקבלו ==="
          echo "$UPDATES" | grep -o '"text":"[^"]*"' || echo "אין הודעות"
          echo "=== END DEBUG ==="
          
          # תאריך תחילת החודש הנוכחי (timestamp)
          MONTH_START=$(date -d "$(date +%Y-%m-01)" +%s)
          echo "DEBUG: תחילת החודש (timestamp): $MONTH_START"
          
          # בדוק אם יש הודעת "קניתי" מהחודש הזה
          if echo "$UPDATES" | grep -q '"text":"קניתי"'; then
            # בדוק אם ההודעה מהחודש הנוכחי
            MSG_DATE=$(echo "$UPDATES" | grep -o '"date":[0-9]*' | grep -o '[0-9]*' | tail -1)
            echo "DEBUG: תאריך ההודעה (timestamp): $MSG_DATE"
            if [ "$MSG_DATE" -ge "$MONTH_START" ]; then
              echo "PAUSED=true" >> $GITHUB_OUTPUT
              echo "✅ נמצאה הודעת קניתי מהחודש - מדלג"
            else
              echo "PAUSED=false" >> $GITHUB_OUTPUT
              echo "⚠️ הודעת קניתי ישנה - ממשיך"
            fi
          else
            echo "PAUSED=false" >> $GITHUB_OUTPUT
            echo "ℹ️ לא נמצאה הודעת קניתי"
          fi
      
      - name: Check stock and notify
        if: steps.check_pause.outputs.PAUSED == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="https://www.mycorporate.co.il/?page=Benefit&uuid=89ff39db-8348-456a-9667-e2dae46e&category_id=81"
          
          RESPONSE=$(curl -s "$URL")
          
          if echo "$RESPONSE" | grep -q 'club-out-of-stock hide'; then
            STATUS="✅ זמין לרכישה במחיר מועדון"
          elif echo "$RESPONSE" | grep -q "נוצלה הזכאות החודשית"; then
            STATUS="⚠️ נוצלה הזכאות החודשית לחבר מועדון"
          elif echo "$RESPONSE" | grep -q "אזל המלאי למחיר מועדון"; then
            STATUS="❌ אזל המלאי למחיר מועדון"
          else
            STATUS="❓ לא ניתן לקבוע סטטוס"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"<b>🏷️ כרטיס Corporate עם הטבת 30%</b>\n\n← ${STATUS}\n\n${URL}\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"
