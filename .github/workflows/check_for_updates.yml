name: Check Corporate Card

on:
  schedule:
    - cron: '0 7,16 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check stock and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="https://www.mycorporate.co.il/?page=Benefit&uuid=89ff39db-8348-456a-9667-e2dae46e&category_id=81"
          
          RESPONSE=$(curl -s "$URL")
          
          if echo "$RESPONSE" | grep -q 'club-out-of-stock hide'; then
            STATUS="✅ זמין לרכישה במחיר מועדון"
          elif echo "$RESPONSE" | grep -q "נוצלה הזכאות החודשית"; then
            STATUS="⚠️ נוצלה הזכאות החודשית לחבר מועדון"
          elif echo "$RESPONSE" | grep -q "אזל המלאי למחיר מועדון"; then
            STATUS="❌ אזל המלאי למחיר מועדון"
          else
            STATUS="❓ לא ניתן לקבוע סטטוס"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"<b>🏷️ כרטיס Corporate עם הטבת 30%</b>\n\n← ${STATUS}\n\n${URL}\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"
