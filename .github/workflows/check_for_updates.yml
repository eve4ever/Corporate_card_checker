name: Check Corporate Card

on:
  schedule:
    - cron: '0 7,16 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new messages and pause status
        id: check_pause
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAUSED_UNTIL: ${{ vars.PAUSED_UNTIL }}
        run: |
          # בדוק אם יש הודעות חדשות
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates")
          
          echo "=== DEBUG: הודעות ==="
          echo "$UPDATES"
          echo "=== END DEBUG ==="
          
          # אם יש הודעת קניתי - שמור את סוף החודש הנוכחי
          if echo "$UPDATES" | grep -qE '\\u05e7\\u05e0\\u05d9\\u05ea\\u05d9|קניתי'; then
            END_OF_MONTH=$(date -d "$(date +%Y-%m-01) +1 month -1 day" +%Y-%m-%d)
            echo "DEBUG: נמצאה הודעת קניתי, משהה עד $END_OF_MONTH"
            
            # שמור ב-GitHub Variable
            gh variable set PAUSED_UNTIL --body "$END_OF_MONTH" --repo ${{ github.repository }}
            
            # נקה את ההודעות מטלגרם
            UPDATE_ID=$(echo "$UPDATES" | grep -oP '"update_id":\K[0-9]+' | tail -1)
            if [ -n "$UPDATE_ID" ]; then
              curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=$((UPDATE_ID + 1))"
            fi
            
            echo "PAUSED=true" >> $GITHUB_OUTPUT
          else
            # בדוק אם עדיין בתוך תקופת ההשהיה
            TODAY=$(date +%Y-%m-%d)
            if [ -n "$PAUSED_UNTIL" ] && [[ "$TODAY" < "$PAUSED_UNTIL" || "$TODAY" == "$PAUSED_UNTIL" ]]; then
              echo "DEBUG: מושהה עד $PAUSED_UNTIL"
              echo "PAUSED=true" >> $GITHUB_OUTPUT
            else
              echo "PAUSED=false" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Check stock and notify
        if: steps.check_pause.outputs.PAUSED == 'false'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="https://www.mycorporate.co.il/?page=Benefit&uuid=89ff39db-8348-456a-9667-e2dae46e&category_id=81"
          
          RESPONSE=$(curl -s "$URL")
          
          if echo "$RESPONSE" | grep -q 'club-out-of-stock hide'; then
            STATUS="✅ זמין לרכישה במחיר מועדון"
          elif echo "$RESPONSE" | grep -q "נוצלה הזכאות החודשית"; then
            STATUS="⚠️ נוצלה הזכאות החודשית לחבר מועדון"
          elif echo "$RESPONSE" | grep -q "אזל המלאי למחיר מועדון"; then
            STATUS="❌ אזל המלאי למחיר מועדון"
          else
            STATUS="❓ לא ניתן לקבוע סטטוס"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"<b>🏷️ כרטיס Corporate עם הטבת 30%</b>\n\n← ${STATUS}\n\n${URL}\", \"parse_mode\": \"HTML\", \"disable_web_page_preview\": true}"
